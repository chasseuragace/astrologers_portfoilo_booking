name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: astrologer-website/package-lock.json
          
      - name: Install dependencies
        working-directory: astrologer-website
        run: npm ci
        
      - name: Build
        working-directory: astrologer-website
        run: npm run build
